       Design tokens — WHOOP design system

      --bg-grad-top:    #1e272d;
      --bg-grad-bottom: #090c0f;
      --app-bg: radial-gradient(135% 120% at 50% -10%, #212b31 0%, #0e1317 55%, #090c0f 100%);

      --surface-0: #0A0E11;
      --surface-1: #141A1F;
      --surface-2: #1E262C;
      --surface-3: #2A333A;
      --surface-line: rgba(255, 255, 255, 0.08);

      --fg-1: #FFFFFF;
      --fg-2: rgba(255, 255, 255, 0.62);

      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-pill: 999px;

      --space-1: 4px;
      --space-2: 8px;

      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;

      --shadow-lg: 0 18px 50px rgba(0, 0, 0, 0.55);
      --glow-teal: 0 0 24px rgba(0, 241, 159, 0.35);

      --glass: linear-gradient(180deg, rgba(34, 43, 50, 0.66), rgba(18, 24, 29, 0.66));

    .whoop-h2 { font-family: var(--font-sans); font-weight: 700; font-size: 30px; line-height: 1.1; letter-spacing: 0.10em; text-transform: uppercase; color: var(--fg-1); }
    .whoop-h3 { font-family: var(--font-sans); font-weight: 700; font-size: 20px; line-height: 1.15; letter-spacing: 0.10em; text-transform: uppercase; color: var(--fg-1); }
    .whoop-eyebrow { font-family: var(--font-sans); font-weight: 700; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); }
    .whoop-b1 { font-family: var(--font-sans); font-weight: 600; font-size: 18px; line-height: 1.5; color: var(--fg-1); }
    .whoop-b2 { font-family: var(--font-sans); font-weight: 600; font-size: 16px; line-height: 1.5; color: var(--fg-1); }
    .whoop-b3 { font-family: var(--font-sans); font-weight: 500; font-size: 14px; line-height: 1.45; color: var(--fg-2); }
    .whoop-b4 { font-family: var(--font-sans); font-weight: 500; font-size: 12px; line-height: 1.4; color: var(--fg-2); }
    .whoop-num { font-family: var(--font-num); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; color: var(--fg-1); }

    /* Base */
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--app-bg);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--fg-1);
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    textarea::placeholder { color: var(--fg-disabled); }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 999px; }

    /* Ambient drifting light blobs behind everything */
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%;
      filter: blur(90px); opacity: 0.10; pointer-events: none; z-index: 0; will-change: transform;
    }
    body::before { width: 46vw; height: 46vw; max-width: 560px; max-height: 560px; background: var(--teal);

    body::after  { width: 50vw; height: 50vw; max-width: 600px; max-height: 600px; background: var(--recovery-blue);
      bottom: -18vw; right: -12vw; animation: drift2 30s ease-in-out infinite alternate; }
    @keyframes drift1 { to { transform: translate(14vw, 9vw) scale(1.15); } }
    @keyframes drift2 { to { transform: translate(-11vw, -7vw) scale(1.10); } }

    #root { position: relative; z-index: 1; }

    /* Hide scrollbar (used by the horizontally-scrollable habit tabs) */
    .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* Press feedback on every button */
    button { transition: transform 0.08s var(--ease); }
    button:active:not(:disabled) { transform: scale(0.97); }

    @media (prefers-reduced-motion: reduce) {
      body::before, body::after { animation: none !important; }
      *, *::before, *::after {
        animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important; scroll-behavior: auto !important;
      }
    }

   LIB — icons, atoms, date + color helpers, demo-data seeding
   ============================================================ */
const { useState, useEffect, useRef, useMemo, useCallback, useLayoutEffect } = React;

/* framer-motion globals — bound in boot() once the ESM module has loaded */
let motion, AnimatePresence, MotionConfig, useMotionValue, animate;

/* ============================================================
   MOTION — shared variants, easing, and an animated number
   ============================================================ */
const EASE = [0.16, 1, 0.3, 1];                 // expo-out
const SPRING = { type: 'spring', damping: 22, stiffness: 220 };
const fadeUp = {
  hidden: { opacity: 0, y: 14 },
  show: { opacity: 1, y: 0, transition: { duration: 0.5, ease: EASE } },
};
const stagger = {
  hidden: {},
  show: { transition: { staggerChildren: 0.07, delayChildren: 0.04 } },
};
/* Heatmap left-to-right reveal wave (per week-column) */
const colStagger = { hidden: {}, show: { transition: { staggerChildren: 0.012 } } };
const colItem = {
  hidden: { opacity: 0, y: 6 },
  show: { opacity: 1, y: 0, transition: { duration: 0.28, ease: EASE } },
};

/* Count-up number; falls back to plain text until framer is bound */
function Count({ value, className, style }) {
  const [disp, setDisp] = useState(value);
  const prev = useRef(value);
  useEffect(() => {
    if (!animate || !useMotionValue) { setDisp(value); return; }
    const from = prev.current; prev.current = value;
    if (from === value) { setDisp(value); return; }
    const controls = animate(from, value, {
      duration: 0.7, ease: EASE,
      onUpdate: (v) => setDisp(Math.round(v)),
    });
    return () => controls.stop();
  }, [value]);
  return <span className={className} style={style}>{disp}</span>;
}

/* Card */
function Card({ children, style = {}, pad = 22, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <motion.div onClick={onClick}
      variants={fadeUp}
      whileHover={onClick ? { y: -3 } : undefined}
      transition={SPRING}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: hover && onClick ? 'var(--glass-hover)' : 'var(--glass)',
        backdropFilter: 'blur(14px)', WebkitBackdropFilter: 'blur(14px)',
        border: '1px solid var(--surface-line)', borderRadius: 18,
        boxShadow: 'var(--shadow-md), var(--glass-highlight)',
        padding: pad, cursor: onClick ? 'pointer' : 'default',
        transition: 'background .18s', ...style,
      }}>
      {children}
    </motion.div>
  );
}

/* Date helpers */
const DAY_MS = 86400000;
const pad2 = (n) => String(n).padStart(2, '0');
function keyOf(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
function startOfDay(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function mondayOf(d) { const x = startOfDay(d); return addDays(x, -((x.getDay() + 6) % 7)); }
function weekDates(monday) { return [0, 1, 2, 3, 4, 5, 6].map((i) => addDays(monday, i)); }
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
function fmtLong(d) { return `${DOW[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`; }

/* Build 53-week grid ending on the week containing today */
function buildWeeks(today) {
  const t = startOfDay(today);
  const lastSunday = addDays(t, -t.getDay());
  const firstSunday = addDays(lastSunday, -52 * 7);
  const weeks = [];
  for (let w = 0; w < 53; w++) {
    const col = [];
    for (let d = 0; d < 7; d++) {
      const date = addDays(firstSunday, w * 7 + d);
      col.push(date > t ? null : date);
    }
    weeks.push(col);
  }
  return weeks;
}

/* Color scales — original WHOOP-style oklch ramp, parameterized by hue so any
   palette color renders with the same refined dark->bright gradient. */
const EMPTY_CELL = 'rgba(255,255,255,0.05)';
const WORKOUT_GREEN = 'oklch(0.77 0.245 142)';

/* Map a stored habit color to its oklch hue (see PALETTE); default to green. */
function hueOf(color) {
  const p = (typeof PALETTE !== 'undefined') ? PALETTE.find((x) => x.color === color) : null;
  return p ? p.hue : 145;
}
/* The solid / peak color for a hue — used for binary cells, tab dots, accents. */
function peakColor(hue) { return `oklch(0.77 0.235 ${hue})`; }

/* n: 0..levels (0 = empty). Reproduces the original LC_SCALE gradient:
   dark/muted (L 0.42, C 0.11) at level 1 -> bright (L 0.84, C 0.27) at the top. */
function rampColor(base, levels, n) {
  if ((n | 0) <= 0) return EMPTY_CELL;
  const maxN = Math.max(2, levels | 0);
  const s = Math.min(1, Math.max(0, (n - 1) / (maxN - 1)));
  const hue = hueOf(base);
  const L = (0.42 + 0.42 * s).toFixed(3); // 0.42 -> 0.84
  const C = (0.11 + 0.16 * s).toFixed(3); // 0.11 -> 0.27
  return `oklch(${L} ${C} ${hue})`;
}
function rampScale(base, levels) {
  const out = [EMPTY_CELL];
  for (let i = 1; i <= Math.max(1, levels | 0); i++) out.push(rampColor(base, levels, i));
  return out;
}

/* Fold a realtime change from another client into local state */
function applyRealtime(prev, payload) {
  const next = { ...prev };
  if (payload.eventType === 'DELETE') {
    const r = payload.old;
    if (!r || r.habit_id == null) return prev;
    const hd = { ...(next[r.habit_id] || {}) };
    delete hd[r.entry_date];
    next[r.habit_id] = hd;
  } else {
    const r = payload.new;
    if (!r) return prev;
    const hd = { ...(next[r.habit_id] || {}) };
    hd[r.entry_date] = { v: r.value, note: r.note || '' };
    next[r.habit_id] = hd;
  }
  return next;
}

                        boxShadow: max ? `0 0 7px ${cellColor(habit, entry)}` : 'none',
                        transition: 'transform .1s, background .2s',
                        transform: hover && hover.key === key ? 'scale(1.25)' : 'scale(1)',
                      }} />
                  );
                })}
              </motion.div>
            ))}
          </motion.div>
        </div>

        {/* legend */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 7, marginTop: 14, paddingRight: 2 }}>
          <span style={{ fontSize: 11, color: 'var(--fg-3)', fontWeight: 600 }}>Less</span>
          {(habit.type === 'binary' ? [EMPTY_CELL, habit.accent] : rampScale(habit.color, habit.levels || 5)).map((c, i) => (
            <span key={i} style={{ width: CELL, height: CELL, borderRadius: 3, background: c, outline: '1px solid rgba(255,255,255,0.045)', outlineOffset: -1 }} />
          ))}
          <span style={{ fontSize: 11, color: 'var(--fg-3)', fontWeight: 600 }}>More</span>
        </div>
      </div>

      {hover && !sel && <Tooltip habit={habit} date={hover.date} entry={data[hover.key]} breakdown={codingDaily && codingDaily[hover.key]} rect={hover.rect} />}
      <AnimatePresence>
        {sel && (
          <Editor key="cell-editor" habit={habit} date={sel.date} entry={data[sel.key]}
            breakdown={codingDaily && codingDaily[sel.key]}
            onChange={(e) => onSet(sel.key, e)} onManual={onCodingManual} onNote={onCodingNote}
            onClose={() => setSel(null)} />
        )}
      </AnimatePresence>
    </div>
  );
}

/* ============================================================
   STATS — weekly performance, cards, trend, two-week glance
   ============================================================ */
function valOf(habit, entry) {
  if (!entry) return 0;
  return habit.type === 'binary' ? (entry.v ? 1 : 0) : entry.v;
}

function computeStats(habit, data, weeks, today) {
  const weekTotal = (offset) => {
    const col = weeks[52 - offset];
    if (!col) return 0;
    return col.reduce((s, d) => s + (d ? valOf(habit, data[keyOf(d)]) : 0), 0);
  };
  const thisWeek = weekTotal(0);
  const lastWeek = weekTotal(1);
  const prior4 = [1, 2, 3, 4].map(weekTotal);
  const avg4 = prior4.reduce((a, b) => a + b, 0) / 4;

  const active = (d) => valOf(habit, data[keyOf(d)]) > 0;
  let cur = 0, cursor = startOfDay(today);
  if (!active(cursor)) cursor = addDays(cursor, -1);
  while (active(cursor)) { cur++; cursor = addDays(cursor, -1); }

  let longest = 0, run = 0, activeDays = 0, yearTotal = 0;
  weeks.flat().filter(Boolean).forEach((d) => {
    const v = valOf(habit, data[keyOf(d)]);
    if (v > 0) { activeDays++; yearTotal += v; run++; longest = Math.max(longest, run); }
    else run = 0;
  });

  const last8 = [7, 6, 5, 4, 3, 2, 1, 0].map(weekTotal);
  return { thisWeek, lastWeek, avg4, cur, longest, activeDays, yearTotal, last8 };
}

/* Delta chip */
function Delta({ now, base, suffix = '%' }) {
  let pct;
  if (base > 0) pct = Math.round(((now - base) / base) * 100);
  else pct = now > 0 ? 100 : 0;
  const up = pct > 0, down = pct < 0;
  const color = up ? 'var(--teal)' : down ? 'var(--recovery-low)' : 'var(--fg-3)';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color, fontWeight: 700 }}>
      <Icon name={up ? 'trending-up' : down ? 'trending-down' : 'chevron-right'} size={15} color={color} />
      <span className="whoop-num" style={{ fontSize: 14 }}>{up ? '+' : ''}{pct}{suffix}</span>
    </span>
  );
}

/* Stat card */

}

/* 8-week trend bars */
function TrendCard({ habit, stats }) {
  const data = stats.last8;
  const max = Math.max(1, ...data);
  const accent = habit.accent;
  const labels = ['7w', '6w', '5w', '4w', '3w', '2w', 'Last', 'This'];
  return (
    <Card pad={22} style={{ display: 'flex', flexDirection: 'column' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-3)' }}>Last 8 weeks</span>
        <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg-3)', whiteSpace: 'nowrap' }}>{habit.unit} / wk</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, height: 116 }}>
        {data.map((v, i) => {
          const isThis = i === data.length - 1;
          return (
            <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
              <span className="whoop-num" style={{ fontSize: 12, color: isThis ? accent : 'var(--fg-2)', fontWeight: 700 }}>{v}</span>
              <div style={{
                width: '100%', maxWidth: 30, height: `${Math.max(4, (v / max) * 92)}px`,
                background: isThis ? accent : 'rgba(255,255,255,0.14)',

                boxShadow: isThis ? `0 0 14px ${accent}66` : 'none', transition: 'height .5s',
              }} />
              <span style={{ fontSize: 10, fontWeight: 600, color: isThis ? 'var(--fg-2)' : 'var(--fg-3)' }}>{labels[i]}</span>

}

/* Stats strip */
function StatsStrip({ habit, stats }) {
  const mobile = useIsMobile();
  const accent = habit.accent;
  const avgRounded = habit.type === 'binary' ? stats.avg4.toFixed(1) : Math.round(stats.avg4);
  return (

      <StatCard

/* Two-week glance report (Mon to Sun) */
const WD_LETTERS = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

function rangeLabel(a, b) {
  const right = a.getMonth() === b.getMonth() ? b.getDate() : `${MONTHS[b.getMonth()]} ${b.getDate()}`;
  return `${MONTHS[a.getMonth()]} ${a.getDate()} \u2013 ${right}`;
}

function DayGlance({ habit, date, entry, future, isToday }) {
  const v = entry ? entry.v : 0;
  const done = habit.type === 'binary' ? !!v : v > 0;
  const bright = habit.type === 'binary' || v >= 4;
  const bg = future ? 'transparent' : cellColor(habit, entry);
  const note = entry && entry.note ? entry.note : '';
  const title = future ? '' : `${fmtLong(date)} \u00b7 ${habit.type === 'binary' ? (done ? 'done' : 'rest') : v + ' ' + habit.unit}${note ? ' \u00b7 ' + note : ''}`;
  return (
    <div title={title} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, minWidth: 0 }}>
      <span style={{ fontSize: 11, fontWeight: 700, color: isToday ? 'var(--teal)' : 'var(--fg-3)' }}>{WD_LETTERS[(date.getDay() + 6) % 7]}</span>
      <div style={{
        width: '100%', maxWidth: 44, aspectRatio: '1', borderRadius: 12,
        background: bg,
        border: future ? '1.5px dashed var(--surface-line-strong)' : '1px solid rgba(255,255,255,0.05)',
        outline: isToday ? '2px solid var(--teal)' : 'none', outlineOffset: 2,
        boxShadow: done && bright && !future ? `0 0 12px ${bg}66` : 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        {habit.type === 'binary'
          ? (done && <Icon name="check" size={20} color="#04261a" stroke={2.4} />)
          : (!future && <span className="whoop-num" style={{ fontSize: 18, color: v ? (bright ? '#04261a' : '#fff') : 'var(--fg-disabled)' }}>{v}</span>)}
      </div>
      <span style={{ fontSize: 10, fontWeight: 600, color: isToday ? 'var(--fg-2)' : 'var(--fg-3)' }}>{date.getDate()}</span>
    </div>
  );
}

function WeekBlock({ habit, label, monday, data, today, total, delta }) {
  const days = weekDates(monday);
  const accent = habit.accent;
  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12, marginBottom: 16 }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 3, flex: 'none' }}>
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-2)', whiteSpace: 'nowrap' }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--fg-3)', whiteSpace: 'nowrap' }}>{rangeLabel(days[0], days[6])}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flex: 'none' }}>
          {delta}
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 5 }}>
            <span className="whoop-num" style={{ fontSize: 30, lineHeight: 1, color: accent }}>{total}</span>
            <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg-3)' }}>{habit.unit}</span>
          </div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 7 }}>
        {days.map((d, i) => (
          <DayGlance key={i} habit={habit} date={d} entry={data[keyOf(d)]} future={d > today} isToday={keyOf(d) === keyOf(today)} />
        ))}
      </div>
    </div>
  );
}

function WeekReport({ habit, data, today }) {
  const mobile = useIsMobile();
  const thisMon = mondayOf(today);
  const lastMon = addDays(thisMon, -7);
  const sum = (mon) => weekDates(mon).reduce((s, d) => s + (d <= today ? valOf(habit, data[keyOf(d)]) : 0), 0);
  const lastTotal = sum(lastMon);
  const thisTotal = sum(thisMon);
  return (
    <Card pad={mobile ? 18 : 26} style={{ marginTop: 16 }}>
      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-3)' }}>{'Last 2 weeks \u00b7 Mon \u2192 Sun'}</span>
      <div style={{ display: 'flex', flexDirection: mobile ? 'column' : 'row', gap: mobile ? 24 : 40, marginTop: 20, alignItems: 'stretch' }}>
        <WeekBlock habit={habit} label="Last week" monday={lastMon} data={data} today={today} total={lastTotal} />
        <div style={{ flex: 'none', background: 'var(--surface-line)', ...(mobile ? { height: 1, width: '100%' } : { width: 1, alignSelf: 'stretch' }) }} />
        <WeekBlock habit={habit} label="This week" monday={thisMon} data={data} today={today} total={thisTotal}
          delta={<Delta now={thisTotal} base={lastTotal} />} />
      </div>
    </Card>
  );
}

function App({ userId, email }) {
  const today = useMemo(() => startOfDay(new Date()), []);

  const [store, setStore] = useState(emptyStore);
  const [habits, setHabits] = useState([]);
  const [synced, setSynced] = useState(false);
  const [activeId, setActiveId] = useState(null);
  const [modal, setModal] = useState(null); // null | { habit } (habit null => create)
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [coding, setCoding] = useState(DEFAULT_CODING);
  const [codingDaily, setCodingDaily] = useState({}); // { 'YYYY-MM-DD': {leetcode,gfg,manual} }
  const [syncing, setSyncing] = useState(false);

  const habit = habits.find((h) => h.id === activeId) || null;
  const data = habit ? (store[habit.id] || {}) : {};
  const stats = useMemo(() => (habit ? computeStats(habit, data, weeks, today) : null), [habit, data, weeks, today]);

  /* Load habits + entries + settings on mount; subscribe to live changes on all tables. */
  useEffect(() => {
    let mounted = true;
    Promise.all([fetchHabits(), fetchStore(), fetchSettings(), fetchCodingProfile(), fetchCodingDaily()]).then(([hs, s, st, cp, cd]) => {
      if (!mounted) return;
      setHabits(hs); setStore(s); setSettings(st); setCoding(cp); setCodingDaily(cd); applyPrimaryColor(st.primary_color); setSynced(true);
    });
    const eChannel = sb.channel('habit_entries_rt')

      .subscribe();
    const hChannel = sb.channel('habits_rt')

      .subscribe();
    const sChannel = sb.channel('app_settings_rt')

    const cChannel = sb.channel('coding_profiles_rt')

  const saveAppSettings = (patch) => {

  };
  const cancelSettings = () => { applyPrimaryColor(settings.primary_color); setSettingsOpen(false); };

  /* Persist coding usernames, then run a sync and pull the fresh habit + entries. */
  const runCodingSync = (codingPatch) => {
    const nextCoding = { ...coding, ...codingPatch };
    setCoding(nextCoding);
    const willSync = nextCoding.enabled && ((nextCoding.leetcode_username || '').trim() || (nextCoding.gfg_username || '').trim());
    saveCodingProfile(codingPatch, userId).then(() => {
      if (!willSync) return;
      setSyncing(true);
      triggerCodingSync({ leetcode_username: nextCoding.leetcode_username || '', gfg_username: nextCoding.gfg_username || '' }).then(() => {

    });

  /* Adjust the manual component of a coding day (optimistic; trigger recomputes the heatmap). */
  const onCodingManual = useCallback((key, newManual, autoSum) => {
    setCodingDaily((prev) => ({ ...prev, [key]: { ...(prev[key] || { leetcode: 0, gfg: 0, manual: 0 }), manual: newManual } }));
    const total = autoSum + newManual;
    setStore((prev) => {
      const hd = { ...(prev[activeId] || {}) };
      if (total > 0) hd[key] = { v: total, note: (hd[key] && hd[key].note) || '' };
      else delete hd[key];
      return { ...prev, [activeId]: hd };
    });
    saveCodingManual(userId, key, newManual);
  }, [activeId, userId]);

      return { ...prev, [activeId]: hd };

  useEffect(() => {

      else habitData[key] = entry;
      return { ...prev, [activeId]: habitData };

    } else {
      // A coding habit uses a deterministic id so it pairs 1:1 with the coding profile.

      const sort_order = habits.length ? Math.max(...habits.map((h) => h.sort_order)) + 1 : 0;
      setHabits((prev) => [...prev.filter((h) => h.id !== id), rowToHabit({ id, ...form, sort_order })]);
      setActiveId(id);
      insertHabit({ id, ...form, sort_order }, userId);

    if (codingPatch) runCodingSync(codingPatch);
    setModal(null);

  const removeHabit = (id) => {

      <Icon name="plus" size={15} color="var(--fg-3)" />New habit

  );

  return (
    <motion.div initial="hidden" animate="show" variants={stagger}

          <span style={{ width: 1, height: 26, background: 'var(--surface-line-strong)' }} />
          <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.16em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>Habit Tracker</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <span title={synced ? 'Saved to cloud' : 'Connecting to cloud…'}
            style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: synced ? 'var(--teal)' : 'var(--fg-3)' }}>
            <span style={{ width: 7, height: 7, borderRadius: 999, flex: 'none', background: synced ? 'var(--teal)' : 'var(--fg-disabled)', boxShadow: synced ? '0 0 8px var(--teal)' : 'none' }} />

        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 22 }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 'none' }}>
            <Icon name={habit.icon} size={22} color={habit.accent} />
          </div>
          <div style={{ minWidth: 0 }}>
            <h3 className="whoop-h3" style={{ margin: 0 }}>{habit.name}</h3>
            <div style={{ fontSize: 13, color: 'var(--fg-2)', fontWeight: 500, marginTop: 3 }}>{yearlySummary}</div>
          </div>

                style={{ width: 36, height: 36, borderRadius: 10, flex: 'none', cursor: syncing ? 'default' : 'pointer', background: 'var(--surface-2)', border: '1px solid var(--surface-line)', color: syncing ? 'var(--teal)' : 'var(--fg-2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

            <button onClick={() => setModal({ habit })} title="Edit habit"

              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-3)', marginTop: 2 }}>Day streak</div>
            </div>

        </div>
        <Heatmap habit={habit} data={data} weeks={displayWeeks} onSet={onSet}
          codingDaily={habit.source === 'coding' ? codingDaily : null} onCodingManual={onCodingManual} onCodingNote={onCodingNote} />
        <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 14, display: 'flex', alignItems: 'center', gap: 7 }}>
          <Icon name="pencil" size={13} color="var(--fg-3)" />
          <span>Click any day to log {habit.name} and add a note {'\u00b7'} hover to review</span>
        </div>
      </Card>

      {/* two-week glance — directly under heatmap */}
      <WeekReport habit={habit} data={data} today={today} />

      {/* stats */}
      <div style={{ marginTop: 16 }}>

      ) : (
        <Card pad={mobile ? 28 : 44} style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--fg-1)', marginBottom: 6 }}>{synced ? 'No habits yet' : 'Loading…'}</div>
          {synced && <div style={{ fontSize: 13, color: 'var(--fg-3)' }}>{'Create your first habit with the New habit button above.'}</div>}
        </Card>
      )}

      <AnimatePresence>
        {modal && (
          <HabitModal key="habit-modal" initial={modal.habit} coding={coding} syncing={syncing} onSave={saveHabit} onDelete={removeHabit} onClose={() => setModal(null)} />
        )}
        {settingsOpen && (
          <SettingsModal key="settings-modal" settings={settings} email={email} onSave={saveAppSettings} onSignOut={() => sb.auth.signOut()} onClose={cancelSettings} />
        )}
      </AnimatePresence>
    </motion.div>
  );
}

  _s.textContent = '@keyframes cellPulse{0%,100%{opacity:var(--baseOp);}50%{opacity:calc(var(--baseOp)*1.7);}}@media (prefers-reduced-motion: reduce){[style*="cellPulse"]{animation:none!important;}}';

/* Seeded RNG so the streak grid is stable across renders. */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* State-driven entrance that stays shown (no framer dependency). */
function AuthReveal({ delay = 0, children, style = {} }) {
  const [on, setOn] = useState(false);
  useEffect(() => { const t = setTimeout(() => setOn(true), 60 + delay); return () => clearTimeout(t); }, []);
  return <div style={{ transform: on ? 'none' : 'translateY(16px)', opacity: on ? 1 : 0, transition: 'transform .7s cubic-bezier(.2,.7,.2,1), opacity .7s ease', ...style }}>{children}</div>;
}

/* Living streak heatmap — the signature visual, pulsing in WHOOP green. */
function StreakGrid({ accent }) {
  const COLS = 30, ROWS = 14, CELL = 22, GAP = 7;
  const cells = useMemo(() => {
    const rnd = mulberry32(7); const out = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const n = rnd();
        const bias = c / COLS;            // recent (right) skews to stronger streaks
        const v = n * 0.72 + bias * 0.5;
        let level = 0;
        if (v > 1.0) level = 4; else if (v > 0.82) level = 3; else if (v > 0.62) level = 2; else if (v > 0.4) level = 1;
        out.push({ level, wave: (c + r) % 9, glow: rnd() > 0.86 && level >= 3 });
      }
    }
    return out;
  }, []);
  const ramp = { 1: 0.26, 2: 0.46, 3: 0.7, 4: 1 };
  return (
    <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
      <div style={{ display: 'grid', gap: GAP, gridTemplateColumns: `repeat(${COLS}, ${CELL}px)`, gridTemplateRows: `repeat(${ROWS}, ${CELL}px)`, transform: 'rotate(-12deg) scale(1.35)', transformOrigin: 'center', opacity: 0.9 }}>
        {cells.map((cell, i) => {
          const op = cell.level === 0 ? 1 : ramp[cell.level];
          const bg = cell.level === 0 ? 'rgba(255,255,255,0.045)' : accent;
          return <div key={i} style={{ borderRadius: 5, background: bg, opacity: op, animation: `cellPulse 4.2s ease-in-out ${cell.wave * 0.35}s infinite`, boxShadow: cell.glow ? `0 0 14px ${accent}` : 'none', ['--baseOp']: op }} />;
        })}
      </div>
    </div>
  );
}

/* Live streak badge — counts up on mount. */
function StreakBadge({ accent }) {
  const target = 147;
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf, start; const dur = 1400;
    const tick = (ts) => { if (!start) start = ts; const p = Math.min(1, (ts - start) / dur); setN(Math.round((1 - Math.pow(1 - p, 3)) * target)); if (p < 1) raf = requestAnimationFrame(tick); };
    const t = setTimeout(() => { raf = requestAnimationFrame(tick); }, 450);
    return () => { clearTimeout(t); cancelAnimationFrame(raf); };
  }, []);
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12, padding: '11px 18px 11px 14px', borderRadius: 999, background: 'rgba(10,14,17,0.55)', border: '1px solid var(--surface-line-strong)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)' }}>
      <span style={{ width: 34, height: 34, borderRadius: 999, flex: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,241,159,0.14)' }}>
        <Icon name="flame" size={18} color={accent} stroke={2.2} />
      </span>
      <div style={{ lineHeight: 1 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 7, whiteSpace: 'nowrap' }}>
          <span className="whoop-num" style={{ fontFamily: 'var(--font-num)', fontWeight: 700, fontSize: 26, color: '#fff', fontVariantNumeric: 'tabular-nums' }}>{n}</span>
          <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>day streak</span>
        </div>
        <div style={{ fontSize: 11.5, color: 'var(--fg-3)', fontWeight: 600, marginTop: 5, whiteSpace: 'nowrap' }}>Your personal best, keep it going</div>
      </div>
    </div>
  );
}

const AUTH_HERO = {
  signin: { head: ["DON'T BREAK", 'THE CHAIN'], sub: 'Every day you show up, the streak grows. Sign back in and keep the momentum alive.' },
  signup: { head: ['BUILD THE', 'DAILY WIN'], sub: 'Small reps, stacked daily. Start tracking the habits that move you.' },
  reset:  { head: ['RESET &', 'RESUME'], sub: 'It happens to everyone. We will email you a secure link to set a new password.' },
};

function AuthScreen() {
  const mobile = useIsMobile();
  const accent = AUTH_ACCENT;
  const [mode, setMode] = useState('signin'); // 'signin' | 'signup' | 'reset'
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [show, setShow] = useState(false);
  const [remember, setRemember] = useState(true);
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [busy, setBusy] = useState(false);
  const [btnHover, setBtnHover] = useState(false);

  // The previous user's accent may linger on --teal; reset to default on the login screen.
  useEffect(() => { applyPrimaryColor('#00F19F'); }, []);

  const go = (m) => { setMode(m); setErr(''); setMsg(''); };
  const social = () => { setMsg(''); setErr("Google and Apple sign-in aren't available yet. Please use your email and password for now."); };

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr(''); setMsg('');
    if (!email.trim()) { setErr('Enter your email.'); return; }
    if (mode !== 'reset' && password.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    setBusy(true);
    try {
      if (mode === 'signup') {
        const { data, error } = await sb.auth.signUp({ email: email.trim(), password });
        if (error) throw error;
        if (!data.session) setMsg('Account created. Check your email to confirm, then sign in.');
      } else if (mode === 'reset') {
        const { error } = await sb.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.origin });
        if (error) throw error;
        setMsg('If that email has an account, a password-reset link is on its way. Check your inbox.');
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
      }
    } catch (e2) { setErr(e2.message || 'Something went wrong.'); }
    setBusy(false);
  };

  const hero = AUTH_HERO[mode] || AUTH_HERO.signin;
  const eyebrow = mode === 'signin' ? 'Welcome back' : mode === 'signup' ? 'Get started' : 'Forgot password';
  const title = mode === 'signin' ? 'Sign in' : mode === 'signup' ? 'Create account' : 'Reset password';
  const formSub = mode === 'signin' ? 'Pick up where your streak left off.' : mode === 'signup' ? 'Start your streak today, one square at a time.' : "Enter your email and we'll send a reset link.";
  const cta = mode === 'signin' ? 'Sign in' : mode === 'signup' ? 'Create account' : 'Send reset link';

  return (
    <AuthShell head={hero.head} sub={hero.sub} mobile={mobile}>
      <span className="whoop-eyebrow" style={{ color: accent, display: 'block', marginBottom: 12 }}>{eyebrow}</span>
      <h2 style={{ margin: 0, fontFamily: 'var(--font-sans)', fontWeight: 800, fontSize: 34, lineHeight: 1.04, letterSpacing: '.04em', textTransform: 'uppercase', color: '#fff', whiteSpace: 'nowrap' }}>{title}</h2>
      <p style={{ margin: '10px 0 30px', fontSize: 15, color: 'var(--fg-2)', fontWeight: 500 }}>{formSub}</p>

      <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <AuthField icon="mail" type="email" placeholder="Email" value={email} onChange={setEmail} accent={accent} autoComplete="email" autoFocus />
        {mode !== 'reset' && (
          <AuthField icon="lock" type={show ? 'text' : 'password'} placeholder="Password" value={password} onChange={setPassword} accent={accent}
            autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
            trailing={
              <button type="button" onClick={() => setShow((s) => !s)} aria-label={show ? 'Hide password' : 'Show password'}
                style={{ display: 'flex', padding: 4, border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--fg-3)' }}>
                <Icon name={show ? 'eye-off' : 'eye'} size={19} color="var(--fg-3)" stroke={1.9} />
              </button>
            } />
        )}

        {mode === 'signin' && (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', margin: '2px 0 6px' }}>
            <button type="button" onClick={() => setRemember((r) => !r)}
              style={{ display: 'inline-flex', alignItems: 'center', gap: 9, border: 'none', background: 'transparent', cursor: 'pointer', padding: 0, color: 'var(--fg-2)', fontSize: 13.5, fontWeight: 600 }}>
              <span style={{ width: 20, height: 20, borderRadius: 6, flex: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', border: `1.5px solid ${remember ? accent : 'var(--surface-line-strong)'}`, background: remember ? accent : 'transparent', transition: 'all .15s' }}>
                {remember && <Icon name="check" size={13} color="#06231a" stroke={3} />}
              </span>
              Remember me
            </button>
            <button type="button" onClick={() => go('reset')} style={{ fontSize: 13.5, fontWeight: 700, color: accent, background: 'none', border: 'none', cursor: 'pointer', padding: 0, whiteSpace: 'nowrap' }}>Forgot password?</button>
          </div>
        )}

        {err && <div style={{ color: 'var(--recovery-low)', fontSize: 13, fontWeight: 600, lineHeight: 1.4 }}>{err}</div>}
        {msg && <div style={{ color: 'var(--teal)', fontSize: 13, fontWeight: 600, lineHeight: 1.4 }}>{msg}</div>}

        <button type="submit" disabled={busy}
          onMouseEnter={() => setBtnHover(true)} onMouseLeave={() => setBtnHover(false)}
          style={{ height: 56, borderRadius: 'var(--radius-md)', border: 'none', cursor: busy ? 'default' : 'pointer', background: accent, color: '#06231a', fontFamily: 'var(--font-sans)', fontWeight: 800, fontSize: 14.5, letterSpacing: '.12em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, whiteSpace: 'nowrap', opacity: busy ? 0.7 : 1, boxShadow: btnHover && !busy ? `0 0 0 1px ${accent}, 0 10px 34px ${accent}55` : `0 0 26px ${accent}3a`, transform: btnHover && !busy ? 'translateY(-1px)' : 'none', transition: 'transform .15s, box-shadow .2s, opacity .2s' }}>
          {busy ? 'Please wait…' : cta}
          {!busy && <span style={{ display: 'flex', transform: btnHover ? 'translateX(3px)' : 'none', transition: 'transform .15s' }}><Icon name="arrow-right" size={18} color="#06231a" stroke={2.4} /></span>}
        </button>
      </form>

      {mode !== 'reset' && (
        <>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, margin: '24px 0' }}>
            <span style={{ flex: 1, height: 1, background: 'var(--surface-line)' }} />
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-3)' }}>or</span>
            <span style={{ flex: 1, height: 1, background: 'var(--surface-line)' }} />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <AuthSocialBtn label="Apple" glyph={<AppleGlyph />} onClick={social} />
            <AuthSocialBtn label="Google" glyph={<GoogleGlyph />} onClick={social} />
          </div>
        </>
      )}

      <p style={{ margin: '28px 0 0', textAlign: 'center', fontSize: 14, color: 'var(--fg-2)', fontWeight: 500 }}>
        {mode === 'signin' && <>New to the tracker? <button type="button" onClick={() => go('signup')} style={{ color: accent, fontWeight: 700, background: 'none', border: 'none', cursor: 'pointer', padding: 0, fontSize: 14 }}>Create account</button></>}
        {mode === 'signup' && <>Already have an account? <button type="button" onClick={() => go('signin')} style={{ color: accent, fontWeight: 700, background: 'none', border: 'none', cursor: 'pointer', padding: 0, fontSize: 14 }}>Sign in</button></>}
        {mode === 'reset' && <button type="button" onClick={() => go('signin')} style={{ color: accent, fontWeight: 700, background: 'none', border: 'none', cursor: 'pointer', padding: 0, fontSize: 14 }}>Back to sign in</button>}
      </p>
    </AuthShell>
  );
}

/* Shown after the user clicks the reset link in their email (recovery session). */
function UpdatePasswordScreen({ onDone }) {
  const mobile = useIsMobile();
  const accent = AUTH_ACCENT;
  const [password, setPassword] = useState('');
  const [show, setShow] = useState(false);
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);
  const [btnHover, setBtnHover] = useState(false);

  useEffect(() => { applyPrimaryColor('#00F19F'); }, []);

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr('');
    if (password.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    setBusy(true);
    try {
      const { error } = await sb.auth.updateUser({ password });
      if (error) throw error;
      try { history.replaceState(null, '', window.location.pathname); } catch (e3) {}
      onDone();
    } catch (e2) { setErr(e2.message || 'Could not update password.'); setBusy(false); }
  };

  return (
    <AuthShell head={['ALMOST', 'THERE']} sub="Set a fresh password and jump right back into your streak." mobile={mobile}>
      <span className="whoop-eyebrow" style={{ color: accent, display: 'block', marginBottom: 12 }}>New password</span>
      <h2 style={{ margin: 0, fontFamily: 'var(--font-sans)', fontWeight: 800, fontSize: 34, lineHeight: 1.04, letterSpacing: '.04em', textTransform: 'uppercase', color: '#fff', whiteSpace: 'nowrap' }}>Reset it</h2>
      <p style={{ margin: '10px 0 30px', fontSize: 15, color: 'var(--fg-2)', fontWeight: 500 }}>Choose a new password for your account.</p>

      <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <AuthField icon="lock" type={show ? 'text' : 'password'} placeholder="New password" value={password} onChange={setPassword} accent={accent} autoComplete="new-password" autoFocus
          trailing={
            <button type="button" onClick={() => setShow((s) => !s)} aria-label={show ? 'Hide password' : 'Show password'}
              style={{ display: 'flex', padding: 4, border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--fg-3)' }}>
              <Icon name={show ? 'eye-off' : 'eye'} size={19} color="var(--fg-3)" stroke={1.9} />
            </button>
          } />
        {err && <div style={{ color: 'var(--recovery-low)', fontSize: 13, fontWeight: 600, lineHeight: 1.4 }}>{err}</div>}
        <button type="submit" disabled={busy}
          onMouseEnter={() => setBtnHover(true)} onMouseLeave={() => setBtnHover(false)}
          style={{ height: 56, borderRadius: 'var(--radius-md)', border: 'none', cursor: busy ? 'default' : 'pointer', background: accent, color: '#06231a', fontFamily: 'var(--font-sans)', fontWeight: 800, fontSize: 14.5, letterSpacing: '.12em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, whiteSpace: 'nowrap', opacity: busy ? 0.7 : 1, boxShadow: btnHover && !busy ? `0 0 0 1px ${accent}, 0 10px 34px ${accent}55` : `0 0 26px ${accent}3a`, transform: btnHover && !busy ? 'translateY(-1px)' : 'none', transition: 'transform .15s, box-shadow .2s, opacity .2s' }}>
          {busy ? 'Please wait…' : 'Update password'}
          {!busy && <span style={{ display: 'flex', transform: btnHover ? 'translateX(3px)' : 'none', transition: 'transform .15s' }}><Icon name="arrow-right" size={18} color="#06231a" stroke={2.4} /></span>}
        </button>
      </form>
    </AuthShell>
  );
}

/* Top-level gate: show the app only when authenticated. */
function Root() {
  const [session, setSession] = useState(undefined); // undefined = loading
  const [recovery, setRecovery] = useState(false);    // true after a password-reset link

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = sb.auth.onAuthStateChange((event, s) => {
      if (event === 'PASSWORD_RECOVERY') setRecovery(true);
      if (event === 'SIGNED_OUT') setRecovery(false);
      setSession(s || null);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (recovery) return <UpdatePasswordScreen onDone={() => setRecovery(false)} />;
  if (session === undefined) {
    return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--fg-3)', fontSize: 13, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase' }}>Loading…</div>;
  }
  if (!session) return <AuthScreen />;
  return <App key={session.user.id} userId={session.user.id} email={session.user.email} />;
}

/* Bind framer-motion globals, then render — gated on the ESM module being ready. */
function boot() {
  const fm = window.FramerMotion || {};
  motion = fm.motion;
  AnimatePresence = fm.AnimatePresence;
  MotionConfig = fm.MotionConfig;
  useMotionValue = fm.useMotionValue;
  animate = fm.animate;
  const tree = MotionConfig
    ? <MotionConfig reducedMotion="user"><Root /></MotionConfig>
    : <Root />;
  ReactDOM.createRoot(document.getElementById('root')).render(tree);
}
if (window.__framerReady) boot();
else window.addEventListener('framer-ready', boot, { once: true });
