/* Card */
function Card({ children, style = {}, pad = 22, onClick }) {

/* Date helpers */
const DAY_MS = 86400000;
const pad2 = (n) => String(n).padStart(2, '0');
function keyOf(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
function startOfDay(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function mondayOf(d) { const x = startOfDay(d); return addDays(x, -((x.getDay() + 6) % 7)); }
function weekDates(monday) { return [0, 1, 2, 3, 4, 5, 6].map((i) => addDays(monday, i)); }
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
function fmtLong(d) { return `${DOW[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`; }

/* Build 53-week grid ending on the week containing today */
function buildWeeks(today) {
  const t = startOfDay(today);
  const lastSunday = addDays(t, -t.getDay());
  const firstSunday = addDays(lastSunday, -52 * 7);
  const weeks = [];
  for (let w = 0; w < 53; w++) {
    const col = [];
    for (let d = 0; d < 7; d++) {
      const date = addDays(firstSunday, w * 7 + d);
      col.push(date > t ? null : date);
    }
    weeks.push(col);
  }
  return weeks;
}

/* Color scales — green intensity ramp generated for ANY number of levels */
const EMPTY_CELL = 'rgba(255,255,255,0.05)';
const WORKOUT_GREEN = 'oklch(0.77 0.245 142)';

/* n: 0..levels (0 = empty). Blends light -> the habit's base color across `levels` steps.
   color-mix works for any palette color without hand-tuned per-hue math. */
function rampColor(base, levels, n) {
  if ((n | 0) <= 0) return EMPTY_CELL;
  const maxN = Math.max(1, levels | 0);
  const t = Math.min(1, (n | 0) / maxN);
  const pct = Math.round(22 + 78 * t); // 22% (lightest) .. 100% (full color), blended over surface
  return `color-mix(in oklab, ${base} ${pct}%, var(--surface-1))`;
}
function rampScale(base, levels) {
  const out = [EMPTY_CELL];
  for (let i = 1; i <= Math.max(1, levels | 0); i++) out.push(rampColor(base, levels, i));
  return out;
}

/* ============================================================
   PERSISTENCE — Supabase backend (shared, persistent storage)
   Data starts empty; every edit upserts/deletes a row so it
   survives refresh for everyone, everywhere. No auth — the
   dataset is global. Anon key + URL are safe to ship (RLS-gated).
   ============================================================ */
const SUPABASE_URL = 'https://wyikiuhxnldzftlatzod.supabase.co';
const SUPABASE_KEY = 'sb_publishable_H5DaO2EHKrg310rnu2zHGw_46nC-NT5';
const TABLE = 'habit_entries';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const HABITS_TABLE = 'habits';
const emptyStore = () => ({});

/* ---- Habits (definitions) data layer ---- */
function rowToHabit(r) {
  const color = r.color || '#16EC06';
  return {
    id: r.id, name: r.name, type: r.type,
    levels: r.levels || (r.type === 'binary' ? 1 : 5),
    unit: r.unit || 'times', icon: r.icon || 'target',
    color, sort_order: r.sort_order || 0, accent: color,
  };
}
function slugify(name) {
  const base = (name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 24) || 'habit';
  return `${base}-${Math.random().toString(36).slice(2, 6)}`;
}
async function fetchHabits() {
  const { data, error } = await sb.from(HABITS_TABLE).select('*').order('sort_order');
  if (error) { console.error('Habits fetch failed:', error.message); return []; }
  return (data || []).map(rowToHabit);
}
async function insertHabit(h, userId) {
  const res = await sb.from(HABITS_TABLE).insert({ id: h.id, name: h.name, type: h.type, levels: h.levels, unit: h.unit, icon: h.icon, color: h.color, sort_order: h.sort_order, user_id: userId });
  if (res.error) console.error('Habit insert failed:', res.error.message);
  return res;
}
async function updateHabit(id, patch) {
  const res = await sb.from(HABITS_TABLE).update(patch).eq('id', id);
  if (res.error) console.error('Habit update failed:', res.error.message);
  return res;
}
async function deleteHabit(id) {
  const res = await sb.from(HABITS_TABLE).delete().eq('id', id); // entries cascade via FK
  if (res.error) console.error('Habit delete failed:', res.error.message);
  return res;
}

/* ---- App settings (one row per user) ---- */
const SETTINGS_TABLE = 'app_settings';
const DEFAULT_SETTINGS = { header_text: 'DHIMANT', primary_color: '#00F19F' };
async function fetchSettings() {
  // RLS scopes this to the signed-in user's single row.
  const { data, error } = await sb.from(SETTINGS_TABLE).select('header_text, primary_color').maybeSingle();
  if (error) { console.error('Settings fetch failed:', error.message); return { ...DEFAULT_SETTINGS }; }
  return { ...DEFAULT_SETTINGS, ...(data || {}) };
}
async function saveSettings(patch, userId) {
  const res = await sb.from(SETTINGS_TABLE).upsert({ user_id: userId, ...patch, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
  if (res.error) console.error('Settings save failed:', res.error.message);
  return res;
}
/* Recolor the app's primary accent by overriding the CSS variable used throughout. */
function applyPrimaryColor(color) {
  if (color) document.documentElement.style.setProperty('--teal', color);
}

/* Pull the whole dataset and shape it into { habitId: { dateKey: {v,note} } } */
async function fetchStore() {
  const store = emptyStore();
  const { data, error } = await sb.from(TABLE).select('habit_id, entry_date, value, note');
  if (error) { console.error('Supabase fetch failed:', error.message); return store; }
  (data || []).forEach((r) => {
    if (!store[r.habit_id]) store[r.habit_id] = {};
    store[r.habit_id][r.entry_date] = { v: r.value, note: r.note || '' };
  });
  return store;
}

/* Persist a single cell. Cleared cells (0 value, no note) are deleted. */
async function persistEntry(habitId, key, entry, userId) {
  const cleared = !entry.v && !(entry.note && entry.note.trim());
  const res = cleared
    ? await sb.from(TABLE).delete().eq('habit_id', habitId).eq('entry_date', key)
    : await sb.from(TABLE).upsert(
        { habit_id: habitId, entry_date: key, value: entry.v | 0, note: entry.note || '', user_id: userId },
        { onConflict: 'habit_id,entry_date' }
      );
  if (res.error) console.error('Supabase save failed:', res.error.message);
  return res;
}

/* Fold a realtime change from another client into local state */
function applyRealtime(prev, payload) {
  const next = { ...prev };
  if (payload.eventType === 'DELETE') {
    const r = payload.old;
    if (!r || r.habit_id == null) return prev;
    const hd = { ...(next[r.habit_id] || {}) };
    delete hd[r.entry_date];
    next[r.habit_id] = hd;
  } else {
    const r = payload.new;
    if (!r) return prev;
    const hd = { ...(next[r.habit_id] || {}) };
    hd[r.entry_date] = { v: r.value, note: r.note || '' };
    next[r.habit_id] = hd;
  }
  return next;
}

/* Responsive hook */
function useIsMobile(bp = 760) {
  const [m, setM] = useState(typeof window !== 'undefined' && (window.__FORCE_MOBILE || window.innerWidth <= bp));
  useEffect(() => {
    if (window.__FORCE_MOBILE) { setM(true); return; }
    const mq = window.matchMedia(`(max-width:${bp}px)`);
    const h = () => setM(mq.matches);
    h(); mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, [bp]);
  return m;
}

/* ============================================================
   HEATMAP — GitHub-style contribution grid + editor + tooltip
   ============================================================ */
const CELL = 14, GAP = 3, STEP = CELL + GAP;

function cellColor(habit, entry) {
  const v = entry ? entry.v : 0;
  if (v <= 0) return EMPTY_CELL;
  if (habit.type === 'binary') return habit.color;
  return rampColor(habit.color, habit.levels || 5, v);
}
function isMax(habit, entry) {
  if (!entry || !entry.v) return false;
  return habit.type === 'binary' ? true : entry.v >= (habit.levels || 5);
}
function singular(u) { return u && u.endsWith('s') ? u.slice(0, -1) : u; }
function unitLabel(habit, v) { return v === 1 ? singular(habit.unit) : habit.unit; }

function monthLabels(weeks) {
  const out = []; let last = -1;
  weeks.forEach((col, ci) => {
    const sun = col[0] || col.find(Boolean);
    if (!sun) return;
    const m = sun.getMonth();
    if (m !== last && ci > 0 && (out.length === 0 || ci - out[out.length - 1].col >= 3)) {
      out.push({ col: ci, label: MONTHS[m] });
    }
    last = m;
  });
  return out;
}

/* Tooltip */
function Tooltip({ habit, date, entry, rect }) {
  if (!rect) return null;
  const W = 200;
  const left = Math.min(window.innerWidth - W - 8, Math.max(8, rect.left + rect.width / 2 - W / 2));
  const top = rect.top - 12;
  const val = entry ? entry.v : 0;
  const valTxt = habit.type === 'binary'
    ? (val ? 'Done' : 'Not done')
    : `${val} ${unitLabel(habit, val)}`;
  return (
    <div style={{

/* Editor popover */
function RoundBtn({ icon, onClick, disabled }) {

  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}

      }}>
      <Icon name={icon} size={20} />

function Editor({ habit, date, entry, rect, onChange, onClose }) {
  const ref = useRef(null);
  const [pos, setPos] = useState(null);
  const W = 268;
  useLayoutEffect(() => {
    const h = ref.current ? ref.current.offsetHeight : 220;
    let left = Math.min(window.innerWidth - W - 10, Math.max(10, rect.left + rect.width / 2 - W / 2));
    let top = rect.bottom + 12;
    if (top + h > window.innerHeight - 10) top = Math.max(10, rect.top - h - 12);
    setPos({ left, top });
  }, [rect]);

  const maxV = habit.type === 'binary' ? 1 : (habit.levels || 5);
  const v = entry ? entry.v : 0;
  const note = entry ? entry.note || '' : '';
  const setV = (nv) => onChange({ v: Math.min(maxV, Math.max(0, nv)), note });
  const setNote = (nn) => onChange({ v, note: nn });

  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 70 }} />
      <div ref={ref} style={{
        position: 'fixed', left: pos ? pos.left : -9999, top: pos ? pos.top : 0, width: W,
        background: 'var(--surface-2)', border: '1px solid var(--surface-line-strong)',
        borderRadius: 16, boxShadow: 'var(--shadow-lg)', padding: 18, zIndex: 71,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>{fmtLong(date)}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--fg-3)', padding: 2, display: 'flex' }}><Icon name="x" size={18} /></button>
        </div>

        {habit.type === 'binary' ? (
          <button onClick={() => setV(v ? 0 : 1)} style={{
            width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9,
            padding: '15px', borderRadius: 12, cursor: 'pointer', transition: 'all .15s',
            fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 14, letterSpacing: '.08em', textTransform: 'uppercase',
            background: v ? habit.color : 'transparent', color: v ? '#04261a' : 'var(--fg-1)',
            border: v ? 'none' : '1.5px solid var(--surface-line-strong)',
            boxShadow: v ? `0 0 18px color-mix(in oklab, ${habit.color} 45%, transparent)` : 'none',
          }}>
            <Icon name={v ? 'check' : habit.icon} size={18} />{v ? 'Done' : `Mark ${habit.name}`}
          </button>
        ) : (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <RoundBtn icon="minus" onClick={() => setV(v - 1)} disabled={v <= 0} />
            <div style={{ textAlign: 'center', minWidth: 96 }}>
              <div className="whoop-num" style={{ fontSize: 48, lineHeight: 1, color: v ? cellColor(habit, { v }) : 'var(--fg-3)' }}>{v}</div>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-3)', marginTop: 4 }}>{unitLabel(habit, v)}</div>
            </div>
            <RoundBtn icon="plus" onClick={() => setV(v + 1)} disabled={v >= maxV} />
          </div>
        )}

        <div style={{ marginTop: 14 }}>
          <textarea value={note} onChange={(e) => setNote(e.target.value)} rows={2}
            placeholder="Add a note (optional)"
            style={{
              width: '100%', boxSizing: 'border-box', resize: 'none', borderRadius: 10,
              background: 'var(--surface-0)', border: '1px solid var(--surface-line)', color: 'var(--fg-1)',
              fontFamily: 'var(--font-sans)', fontSize: 13, lineHeight: 1.4, padding: '10px 11px', outline: 'none',
            }} />
        </div>
      </div>
    </>
  );
}

/* Heatmap grid */
function Heatmap({ habit, data, weeks, onSet }) {
  const [hover, setHover] = useState(null);
  const [sel, setSel] = useState(null);
  const scrollRef = useRef(null);
  const months = useMemo(() => monthLabels(weeks), [weeks]);
  const GUTTER = 30;

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const go = () => { el.scrollLeft = el.scrollWidth; };
    go();
    const raf = requestAnimationFrame(go);
    const t = setTimeout(go, 350);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(go);
    return () => { cancelAnimationFrame(raf); clearTimeout(t); };
  }, [habit.id]);

  const onCellClick = (date, e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const key = keyOf(date);
    setHover(null);
    setSel({ key, date, rect });
  };

  return (
    <div ref={scrollRef} style={{ overflowX: 'auto', paddingBottom: 4 }}>
      <div style={{ minWidth: GUTTER + weeks.length * STEP }}>
        {/* month header */}
        <div style={{ display: 'flex' }}>
          <div style={{ width: GUTTER, flex: 'none' }} />
          <div style={{ position: 'relative', height: 18, flex: 1 }}>

              <span key={m.col} style={{ position: 'absolute', left: m.col * STEP, fontSize: 11, fontWeight: 600, color: 'var(--fg-3)', letterSpacing: '.02em' }}>{m.label}</span>
            ))}
          </div>
        </div>
        {/* day gutter + grid */}
        <div style={{ display: 'flex' }}>
          <div style={{ width: GUTTER, flex: 'none', display: 'flex', flexDirection: 'column', gap: GAP, paddingTop: 0 }}>
            {[0, 1, 2, 3, 4, 5, 6].map((d) => (
              <div key={d} style={{ height: CELL, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', paddingRight: 7, fontSize: 9, fontWeight: 600, color: 'var(--fg-3)' }}>
                {d === 1 ? 'Mon' : d === 3 ? 'Wed' : d === 5 ? 'Fri' : ''}
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: GAP }}>
            {weeks.map((col, ci) => (
              <div key={ci} style={{ display: 'flex', flexDirection: 'column', gap: GAP }}>
                {col.map((date, di) => {
                  if (!date) return <div key={di} style={{ width: CELL, height: CELL }} />;
                  const key = keyOf(date);
                  const entry = data[key];
                  const selected = sel && sel.key === key;
                  const max = isMax(habit, entry);
                  return (
                    <div key={di}
                      onClick={(e) => onCellClick(date, e)}
                      onMouseEnter={(e) => { if (!sel) setHover({ key, date, rect: e.currentTarget.getBoundingClientRect() }); }}
                      onMouseLeave={() => setHover((h) => (h && h.key === key ? null : h))}
                      style={{
                        width: CELL, height: CELL, borderRadius: 3, cursor: 'pointer',
                        background: cellColor(habit, entry),
                        outline: selected ? '2px solid var(--teal)' : '1px solid rgba(255,255,255,0.045)',
                        outlineOffset: selected ? 1 : -1,
                        boxShadow: max ? `0 0 7px ${cellColor(habit, entry)}` : 'none',
                        transition: 'transform .1s, background .2s',
                        transform: hover && hover.key === key ? 'scale(1.25)' : 'scale(1)',
                      }} />
                  );
                })}
              </div>
            ))}
          </div>
        </div>

        {/* legend */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 7, marginTop: 14, paddingRight: 2 }}>
          <span style={{ fontSize: 11, color: 'var(--fg-3)', fontWeight: 600 }}>Less</span>
          {(habit.type === 'binary' ? [EMPTY_CELL, habit.color] : rampScale(habit.color, habit.levels || 5)).map((c, i) => (
            <span key={i} style={{ width: CELL, height: CELL, borderRadius: 3, background: c, outline: '1px solid rgba(255,255,255,0.045)', outlineOffset: -1 }} />
          ))}
          <span style={{ fontSize: 11, color: 'var(--fg-3)', fontWeight: 600 }}>More</span>
        </div>
      </div>

      {hover && !sel && <Tooltip habit={habit} date={hover.date} entry={data[hover.key]} rect={hover.rect} />}
      {sel && (
        <Editor habit={habit} date={sel.date} entry={data[sel.key]} rect={sel.rect}
          onChange={(e) => onSet(sel.key, e)} onClose={() => setSel(null)} />
      )}
    </div>
  );
}

/* ============================================================
   STATS — weekly performance, cards, trend, two-week glance
   ============================================================ */
function valOf(habit, entry) {
  if (!entry) return 0;
  return habit.type === 'binary' ? (entry.v ? 1 : 0) : entry.v;
}

function computeStats(habit, data, weeks, today) {
  const weekTotal = (offset) => {
    const col = weeks[52 - offset];
    if (!col) return 0;
    return col.reduce((s, d) => s + (d ? valOf(habit, data[keyOf(d)]) : 0), 0);
  };
  const thisWeek = weekTotal(0);
  const lastWeek = weekTotal(1);
  const prior4 = [1, 2, 3, 4].map(weekTotal);
  const avg4 = prior4.reduce((a, b) => a + b, 0) / 4;

  const active = (d) => valOf(habit, data[keyOf(d)]) > 0;
  let cur = 0, cursor = startOfDay(today);
  if (!active(cursor)) cursor = addDays(cursor, -1);
  while (active(cursor)) { cur++; cursor = addDays(cursor, -1); }

  let longest = 0, run = 0, activeDays = 0, yearTotal = 0;
  weeks.flat().filter(Boolean).forEach((d) => {
    const v = valOf(habit, data[keyOf(d)]);
    if (v > 0) { activeDays++; yearTotal += v; run++; longest = Math.max(longest, run); }
    else run = 0;
  });

  const last8 = [7, 6, 5, 4, 3, 2, 1, 0].map(weekTotal);
  return { thisWeek, lastWeek, avg4, cur, longest, activeDays, yearTotal, last8 };
}

/* Delta chip */
function Delta({ now, base, suffix = '%' }) {
  let pct;
  if (base > 0) pct = Math.round(((now - base) / base) * 100);
  else pct = now > 0 ? 100 : 0;
  const up = pct > 0, down = pct < 0;
  const color = up ? 'var(--teal)' : down ? 'var(--recovery-low)' : 'var(--fg-3)';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color, fontWeight: 700 }}>
      <Icon name={up ? 'trending-up' : down ? 'trending-down' : 'chevron-right'} size={15} color={color} />
      <span className="whoop-num" style={{ fontSize: 14 }}>{up ? '+' : ''}{pct}{suffix}</span>
    </span>
  );
}

/* Two-week glance report (Mon to Sun) */
const WD_LETTERS = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

function rangeLabel(a, b) {
  const right = a.getMonth() === b.getMonth() ? b.getDate() : `${MONTHS[b.getMonth()]} ${b.getDate()}`;
  return `${MONTHS[a.getMonth()]} ${a.getDate()} \u2013 ${right}`;
}

function DayGlance({ habit, date, entry, future, isToday }) {
  const v = entry ? entry.v : 0;
  const done = habit.type === 'binary' ? !!v : v > 0;
  const bright = habit.type === 'binary' || v >= 4;
  const bg = future ? 'transparent' : cellColor(habit, entry);
  const note = entry && entry.note ? entry.note : '';
  const title = future ? '' : `${fmtLong(date)} \u00b7 ${habit.type === 'binary' ? (done ? 'done' : 'rest') : v + ' ' + habit.unit}${note ? ' \u00b7 ' + note : ''}`;
  return (
    <div title={title} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, minWidth: 0 }}>
      <span style={{ fontSize: 11, fontWeight: 700, color: isToday ? 'var(--teal)' : 'var(--fg-3)' }}>{WD_LETTERS[(date.getDay() + 6) % 7]}</span>
      <div style={{
        width: '100%', maxWidth: 44, aspectRatio: '1', borderRadius: 12,
        background: bg,
        border: future ? '1.5px dashed var(--surface-line-strong)' : '1px solid rgba(255,255,255,0.05)',
        outline: isToday ? '2px solid var(--teal)' : 'none', outlineOffset: 2,
        boxShadow: done && bright && !future ? `0 0 12px ${bg}66` : 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        {habit.type === 'binary'
          ? (done && <Icon name="check" size={20} color="#04261a" stroke={2.4} />)
          : (!future && <span className="whoop-num" style={{ fontSize: 18, color: v ? (bright ? '#04261a' : '#fff') : 'var(--fg-disabled)' }}>{v}</span>)}
      </div>
      <span style={{ fontSize: 10, fontWeight: 600, color: isToday ? 'var(--fg-2)' : 'var(--fg-3)' }}>{date.getDate()}</span>
    </div>
  );
}

function WeekBlock({ habit, label, monday, data, today, total, delta }) {
  const days = weekDates(monday);
  const accent = habit.color;
  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12, marginBottom: 16 }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 3, flex: 'none' }}>
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-2)', whiteSpace: 'nowrap' }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--fg-3)', whiteSpace: 'nowrap' }}>{rangeLabel(days[0], days[6])}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flex: 'none' }}>
          {delta}
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 5 }}>
            <span className="whoop-num" style={{ fontSize: 30, lineHeight: 1, color: accent }}>{total}</span>
            <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg-3)' }}>{habit.unit}</span>
          </div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 7 }}>
        {days.map((d, i) => (
          <DayGlance key={i} habit={habit} date={d} entry={data[keyOf(d)]} future={d > today} isToday={keyOf(d) === keyOf(today)} />
        ))}
      </div>
    </div>
  );
}

function WeekReport({ habit, data, today }) {
  const mobile = useIsMobile();
  const thisMon = mondayOf(today);
  const lastMon = addDays(thisMon, -7);
  const sum = (mon) => weekDates(mon).reduce((s, d) => s + (d <= today ? valOf(habit, data[keyOf(d)]) : 0), 0);
  const lastTotal = sum(lastMon);
  const thisTotal = sum(thisMon);
  return (
    <Card pad={mobile ? 18 : 26} style={{ marginTop: 16 }}>
      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-3)' }}>{'Last 2 weeks \u00b7 Mon \u2192 Sun'}</span>
      <div style={{ display: 'flex', flexDirection: mobile ? 'column' : 'row', gap: mobile ? 24 : 40, marginTop: 20, alignItems: 'stretch' }}>
        <WeekBlock habit={habit} label="Last week" monday={lastMon} data={data} today={today} total={lastTotal} />
        <div style={{ flex: 'none', background: 'var(--surface-line)', ...(mobile ? { height: 1, width: '100%' } : { width: 1, alignSelf: 'stretch' }) }} />
        <WeekBlock habit={habit} label="This week" monday={thisMon} data={data} today={today} total={thisTotal}
          delta={<Delta now={thisTotal} base={lastTotal} />} />
      </div>
    </Card>
  );
}

/* Create / edit / delete a habit. Pure form — persistence handled by caller. */
function HabitModal({ initial, onSave, onDelete, onClose }) {
  const isEdit = !!initial;
  const [name, setName] = useState(initial ? initial.name : '');
  const [type, setType] = useState(initial ? initial.type : 'count');
  const [levels, setLevels] = useState(initial ? (initial.levels || 5) : 5);
  const [unit, setUnit] = useState(initial ? initial.unit : '');
  const [icon, setIcon] = useState(initial ? initial.icon : 'target');
  const [color, setColor] = useState(initial ? (initial.color || '#16EC06') : '#16EC06');
  const [confirmDel, setConfirmDel] = useState(false);
  const canSave = name.trim().length > 0;

  const submit = () => {
    if (!canSave) return;
    onSave({ name: name.trim(), type, levels: type === 'count' ? levels : 1, unit: unit.trim() || 'times', icon, color });
  };

  const field = { width: '100%', boxSizing: 'border-box', borderRadius: 10, background: 'var(--surface-0)', border: '1px solid var(--surface-line)', color: 'var(--fg-1)', fontFamily: 'var(--font-sans)', fontSize: 14, padding: '11px 12px', outline: 'none' };
  const lbl = { fontSize: 11, fontWeight: 700, letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--fg-3)', display: 'block', marginBottom: 8 };
  const previewScale = type === 'binary' ? [EMPTY_CELL, color] : rampScale(color, levels);

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 90, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 420, maxHeight: '90vh', overflowY: 'auto', background: 'var(--surface-2)', border: '1px solid var(--surface-line-strong)', borderRadius: 18, boxShadow: 'var(--shadow-lg)', padding: 22 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
          <span className="whoop-h3" style={{ fontSize: 18 }}>{isEdit ? 'Edit habit' : 'New habit'}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--fg-3)', display: 'flex' }}><Icon name="x" size={20} /></button>
        </div>

        <div style={{ marginBottom: 16 }}>
          <label style={lbl}>Name</label>
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Reading" maxLength={40} style={field} autoFocus />
        </div>

        <div style={{ marginBottom: 16 }}>
          <label style={lbl}>Type</label>
          <div style={{ display: 'flex', gap: 8 }}>
            {[['binary', 'Yes / No'], ['count', 'Count']].map(([val, txt]) => (
              <button key={val} onClick={() => setType(val)} style={{
                flex: 1, padding: '11px', borderRadius: 10, cursor: 'pointer', fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 13,
                background: type === val ? 'var(--surface-3)' : 'transparent',
                border: type === val ? '1.5px solid var(--teal)' : '1.5px solid var(--surface-line-strong)',
                color: type === val ? '#fff' : 'var(--fg-2)',
              }}>{txt}</button>
            ))}
          </div>
          <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 7 }}>
            {type === 'binary' ? 'Each day is simply done or not done.' : 'Log a number each day, shaded by intensity.'}
          </div>
        </div>

        {type === 'count' && (
          <div style={{ marginBottom: 16 }}>
            <label style={lbl}>Levels — {levels}</label>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <input type="range" min={2} max={7} value={levels} onChange={(e) => setLevels(Number(e.target.value))} style={{ flex: 1, accentColor: '#00F19F' }} />
              <div style={{ display: 'flex', gap: 3 }}>
                {previewScale.map((c, i) => <span key={i} style={{ width: 14, height: 14, borderRadius: 3, background: c, outline: '1px solid rgba(255,255,255,0.045)', outlineOffset: -1 }} />)}
              </div>
            </div>
            <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 7 }}>Shades from light to your color ({levels} levels).</div>
          </div>
        )}

        <div style={{ marginBottom: 16 }}>
          <label style={lbl}>Color</label>
          <ColorPicker value={color} onChange={setColor} />
        </div>

        <div style={{ marginBottom: 16 }}>
          <label style={lbl}>Unit label</label>
          <input value={unit} onChange={(e) => setUnit(e.target.value)} placeholder={type === 'binary' ? 'e.g. days' : 'e.g. pages, questions'} maxLength={24} style={field} />
        </div>

        <div style={{ marginBottom: 20 }}>
          <label style={lbl}>Icon</label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {ICON_CHOICES.map((ic) => (
              <button key={ic} onClick={() => setIcon(ic)} style={{
                width: 42, height: 42, borderRadius: 10, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: icon === ic ? 'var(--surface-3)' : 'var(--surface-0)',
                border: icon === ic ? '1.5px solid var(--teal)' : '1px solid var(--surface-line)',
                color: icon === ic ? 'var(--teal)' : 'var(--fg-2)',
              }}><Icon name={ic} size={20} /></button>
            ))}
          </div>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 6 }}>
          {isEdit && (
            <button onClick={() => (confirmDel ? onDelete(initial.id) : setConfirmDel(true))} style={{
              padding: '12px 14px', borderRadius: 10, cursor: 'pointer', fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 13,
              background: confirmDel ? 'var(--recovery-low)' : 'transparent',
              border: confirmDel ? 'none' : '1px solid var(--surface-line-strong)',
              color: confirmDel ? '#fff' : 'var(--recovery-low)',
            }}>{confirmDel ? 'Confirm delete' : 'Delete'}</button>
          )}
          <div style={{ flex: 1 }} />
          <button onClick={onClose} style={{ padding: '12px 16px', borderRadius: 10, cursor: 'pointer', background: 'transparent', border: '1px solid var(--surface-line-strong)', color: 'var(--fg-2)', fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 13 }}>Cancel</button>
          <button onClick={submit} disabled={!canSave} style={{ padding: '12px 20px', borderRadius: 10, cursor: canSave ? 'pointer' : 'default', background: canSave ? 'var(--teal)' : 'var(--surface-1)', border: 'none', color: canSave ? '#04261a' : 'var(--fg-disabled)', fontFamily: 'var(--font-sans)', fontWeight: 800, fontSize: 13 }}>{isEdit ? 'Save' : 'Create'}</button>
        </div>
      </div>
    </div>
  );
}

function Tab({ habit, active, onClick }) {
  const [h, setH] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 9, padding: '10px 18px', borderRadius: 999,
        border: 'none', cursor: 'pointer', transition: 'background .15s, color .15s',
        background: active ? 'var(--surface-3)' : (h ? 'var(--surface-2)' : 'transparent'),
        color: active ? '#fff' : 'var(--fg-2)',
        fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 13, letterSpacing: '.08em', textTransform: 'uppercase',
      }}>
      <span style={{ width: 9, height: 9, borderRadius: 3, background: habit.accent, flex: 'none', boxShadow: active ? `0 0 8px ${habit.accent}` : 'none' }} />
      {habit.name}
    </button>
  );
}

function App({ userId, email }) {
  const today = useMemo(() => startOfDay(new Date()), []);
  const weeks = useMemo(() => buildWeeks(today), [today]);
  const [store, setStore] = useState(emptyStore);
  const [habits, setHabits] = useState([]);
  const [synced, setSynced] = useState(false);
  const [activeId, setActiveId] = useState(null);
  const [modal, setModal] = useState(null); // null | { habit } (habit null => create)
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [settingsOpen, setSettingsOpen] = useState(false);

  const habit = habits.find((h) => h.id === activeId) || null;
  const data = habit ? (store[habit.id] || {}) : {};
  const stats = useMemo(() => (habit ? computeStats(habit, data, weeks, today) : null), [habit, data, weeks, today]);

  /* Load habits + entries + settings on mount; subscribe to live changes on all tables. */
  useEffect(() => {
    let mounted = true;
    Promise.all([fetchHabits(), fetchStore(), fetchSettings()]).then(([hs, s, st]) => {
      if (!mounted) return;
      setHabits(hs); setStore(s); setSettings(st); applyPrimaryColor(st.primary_color); setSynced(true);
    });
    const eChannel = sb.channel('habit_entries_rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE },
        (payload) => { if (mounted) setStore((prev) => applyRealtime(prev, payload)); })
      .subscribe();
    const hChannel = sb.channel('habits_rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: HABITS_TABLE },
        () => { fetchHabits().then((list) => { if (mounted) setHabits(list); }); })
      .subscribe();
    const sChannel = sb.channel('app_settings_rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: SETTINGS_TABLE },
        () => { fetchSettings().then((st) => { if (mounted) { setSettings(st); applyPrimaryColor(st.primary_color); } }); })
      .subscribe();
    return () => { mounted = false; sb.removeChannel(eChannel); sb.removeChannel(hChannel); sb.removeChannel(sChannel); };
  }, []);

  const saveAppSettings = (patch) => {
    const next = { ...settings, ...patch };
    setSettings(next);
    applyPrimaryColor(next.primary_color);
    saveSettings(patch, userId);
    setSettingsOpen(false);
  };
  const cancelSettings = () => { applyPrimaryColor(settings.primary_color); setSettingsOpen(false); };

  /* Keep a valid active habit selected (initial load, deletes, realtime). */
  useEffect(() => {
    if (habits.length && !habits.some((h) => h.id === activeId)) setActiveId(habits[0].id);
  }, [habits, activeId]);

  const onSet = useCallback((key, entry) => {
    setStore((prev) => {
      const habitData = { ...(prev[activeId] || {}) };
      if (!entry.v && !(entry.note && entry.note.trim())) delete habitData[key];
      else habitData[key] = entry;
      return { ...prev, [activeId]: habitData };
    });
    persistEntry(activeId, key, entry, userId);
  }, [activeId, userId]);

  const saveHabit = (form) => {
    if (modal && modal.habit) {
      const id = modal.habit.id;
      const updated = rowToHabit({ ...modal.habit, ...form });
      setHabits((prev) => prev.map((h) => (h.id === id ? updated : h)));
      updateHabit(id, { name: form.name, type: form.type, levels: form.levels, unit: form.unit, icon: form.icon });
    } else {
      const id = slugify(form.name);
      const sort_order = habits.length ? Math.max(...habits.map((h) => h.sort_order)) + 1 : 0;
      setHabits((prev) => [...prev, rowToHabit({ id, ...form, sort_order })]);
      setActiveId(id);
      insertHabit({ id, ...form, sort_order }, userId);
    }
    setModal(null);
  };

  const removeHabit = (id) => {
    const next = habits.filter((h) => h.id !== id);
    setHabits(next);
    if (activeId === id) setActiveId(next[0] ? next[0].id : null);
    deleteHabit(id);
    setModal(null);
  };

  const mobile = useIsMobile();
  const displayWeeks = mobile ? weeks.slice(-17) : weeks;
  const yearlySummary = habit && (habit.type === 'binary'
    ? `${stats.activeDays} ${habit.unit} logged in the last year`
    : `${stats.yearTotal} ${habit.unit} across ${stats.activeDays} active days in the last year`);

  const newHabitBtn = (
    <button onClick={() => setModal({ habit: null })} title="Add a habit"
      style={{ display: 'inline-flex', alignItems: 'center', gap: 7, padding: '11px 16px', borderRadius: 999, cursor: 'pointer', background: 'transparent', border: '1px dashed var(--surface-line-strong)', color: 'var(--fg-3)', fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 12, letterSpacing: '.08em', textTransform: 'uppercase' }}>
      <Icon name="plus" size={15} color="var(--fg-3)" />New habit
    </button>
  );

  return (
    <div style={{ width: '100%', maxWidth: 1180, margin: '0 auto', padding: mobile ? '20px 14px 44px' : '40px 32px 64px' }}>
      {/* header */}
      <header style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: '12px 16px', marginBottom: mobile ? 22 : 30 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <span style={{ fontSize: 18, fontWeight: 800, letterSpacing: '.16em', textTransform: 'uppercase', color: 'var(--fg-1)' }}>{settings.header_text}</span>
          <span style={{ width: 1, height: 26, background: 'var(--surface-line-strong)' }} />
          <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.16em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>Habit Tracker</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <span title={synced ? 'Saved to cloud' : 'Connecting to cloud…'}
            style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: synced ? 'var(--teal)' : 'var(--fg-3)' }}>
            <span style={{ width: 7, height: 7, borderRadius: 999, flex: 'none', background: synced ? 'var(--teal)' : 'var(--fg-disabled)', boxShadow: synced ? '0 0 8px var(--teal)' : 'none' }} />
            {synced ? 'Synced' : 'Syncing…'}
          </span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--fg-3)' }}>
            <Icon name="calendar" size={15} color="var(--fg-3)" />
            <span style={{ fontSize: 12.5, fontWeight: 600 }}>{fmtLong(today)}, {today.getFullYear()}</span>
          </div>
          <button onClick={() => setSettingsOpen(true)} title="Settings"
            style={{ width: 34, height: 34, borderRadius: 10, flex: 'none', cursor: 'pointer', background: 'var(--surface-1)', border: '1px solid var(--surface-line)', color: 'var(--fg-2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="settings" size={17} />
          </button>
        </div>
      </header>

      {/* habit tabs */}
      <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 8, marginBottom: 20 }}>
        {habits.length > 0 && (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, background: 'var(--surface-0)', border: '1px solid var(--surface-line)', borderRadius: 999, padding: 4 }}>
            {habits.map((h) => <Tab key={h.id} habit={h} active={h.id === activeId} onClick={() => setActiveId(h.id)} />)}
          </div>
        )}
        {newHabitBtn}
      </div>

      {habit ? (
      <>
      {/* heatmap card */}
      <Card pad={mobile ? 16 : 26} style={{ marginBottom: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 22 }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 'none' }}>
            <Icon name={habit.icon} size={22} color={habit.accent} />
          </div>
          <div style={{ minWidth: 0 }}>
            <h3 className="whoop-h3" style={{ margin: 0 }}>{habit.name}</h3>
            <div style={{ fontSize: 13, color: 'var(--fg-2)', fontWeight: 500, marginTop: 3 }}>{yearlySummary}</div>
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 16 }}>
            <button onClick={() => setModal({ habit })} title="Edit habit"
              style={{ width: 36, height: 36, borderRadius: 10, flex: 'none', cursor: 'pointer', background: 'var(--surface-2)', border: '1px solid var(--surface-line)', color: 'var(--fg-2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="pencil" size={16} />
            </button>
            <div style={{ textAlign: 'right' }}>
              <div className="whoop-num" style={{ fontSize: 34, lineHeight: 1, color: habit.accent }}>{stats.cur}</div>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--fg-3)', marginTop: 2 }}>Day streak</div>
            </div>
          </div>
        </div>
        <Heatmap habit={habit} data={data} weeks={displayWeeks} onSet={onSet} />
        <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 14, display: 'flex', alignItems: 'center', gap: 7 }}>
          <Icon name="pencil" size={13} color="var(--fg-3)" />
          <span>Click any day to log {habit.name} and add a note {'\u00b7'} hover to review</span>
        </div>
      </Card>

      {/* two-week glance — directly under heatmap */}
      <WeekReport habit={habit} data={data} today={today} />

      {/* stats */}
      <div style={{ marginTop: 16 }}>
        <StatsStrip habit={habit} stats={stats} />
      </div>
      </>
      ) : (
        <Card pad={mobile ? 28 : 44} style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--fg-1)', marginBottom: 6 }}>{synced ? 'No habits yet' : 'Loading…'}</div>
          {synced && <div style={{ fontSize: 13, color: 'var(--fg-3)' }}>{'Create your first habit with the New habit button above.'}</div>}
        </Card>
      )}

      {modal && (
        <HabitModal initial={modal.habit} onSave={saveHabit} onDelete={removeHabit} onClose={() => setModal(null)} />
      )}

      {settingsOpen && (
        <SettingsModal settings={settings} email={email} onSave={saveAppSettings} onSignOut={() => sb.auth.signOut()} onClose={cancelSettings} />
      )}
    </div>
  );
}

/* ============================================================
   AUTH — email/password gate (Supabase Auth)
   ============================================================ */
const AUTH_FIELD = { width: '100%', boxSizing: 'border-box', borderRadius: 10, background: 'var(--surface-0)', border: '1px solid var(--surface-line)', color: 'var(--fg-1)', fontFamily: 'var(--font-sans)', fontSize: 15, padding: '13px 14px', outline: 'none', marginBottom: 12 };
const AUTH_BTN = (busy) => ({ width: '100%', padding: '14px', borderRadius: 10, cursor: busy ? 'default' : 'pointer', border: 'none', background: 'var(--teal)', color: '#04261a', fontFamily: 'var(--font-sans)', fontWeight: 800, fontSize: 14, letterSpacing: '.04em', opacity: busy ? 0.7 : 1 });
const authLink = { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--teal)', fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 13, padding: 0 };

function AuthScreen() {
  const [mode, setMode] = useState('signin'); // 'signin' | 'signup' | 'reset'
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [busy, setBusy] = useState(false);

  // The previous user's accent may linger on --teal; reset to default on the login screen.
  useEffect(() => { applyPrimaryColor('#00F19F'); }, []);

  const go = (m) => { setMode(m); setErr(''); setMsg(''); };

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr(''); setMsg('');
    if (!email.trim()) { setErr('Enter your email.'); return; }
    if (mode !== 'reset' && password.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    setBusy(true);
    try {
      if (mode === 'signup') {
        const { data, error } = await sb.auth.signUp({ email: email.trim(), password });
        if (error) throw error;
        if (!data.session) setMsg('Account created. Check your email to confirm, then sign in.');
      } else if (mode === 'reset') {
        const { error } = await sb.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.origin });
        if (error) throw error;
        setMsg('If that email has an account, a password-reset link is on its way. Check your inbox.');
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
      }
    } catch (e2) { setErr(e2.message || 'Something went wrong.'); }
    setBusy(false);
  };

  const subtitle = mode === 'signin' ? 'Sign in to your habits' : mode === 'signup' ? 'Create your account' : 'Reset your password';
  const cta = mode === 'signin' ? 'Sign in' : mode === 'signup' ? 'Create account' : 'Send reset link';

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <div style={{ width: '100%', maxWidth: 380 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, marginBottom: 8 }}>
          <span style={{ fontSize: 22, fontWeight: 800, letterSpacing: '.16em', textTransform: 'uppercase', color: 'var(--fg-1)' }}>Habit Tracker</span>
        </div>
        <div style={{ textAlign: 'center', fontSize: 13, color: 'var(--fg-3)', marginBottom: 26 }}>{subtitle}</div>

        <form onSubmit={submit}>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email" autoComplete="email" style={AUTH_FIELD} autoFocus />
          {mode !== 'reset' && (
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password" autoComplete={mode === 'signup' ? 'new-password' : 'current-password'} style={AUTH_FIELD} />
          )}

          {err && <div style={{ color: 'var(--recovery-low)', fontSize: 13, marginBottom: 12 }}>{err}</div>}
          {msg && <div style={{ color: 'var(--teal)', fontSize: 13, marginBottom: 12 }}>{msg}</div>}

          <button type="submit" disabled={busy} style={AUTH_BTN(busy)}>{busy ? 'Please wait…' : cta}</button>
        </form>

        {mode === 'signin' && (
          <div style={{ textAlign: 'center', marginTop: 14 }}>
            <button onClick={() => go('reset')} style={authLink}>Forgot password?</button>
          </div>
        )}

        <div style={{ textAlign: 'center', marginTop: 16, fontSize: 13, color: 'var(--fg-3)' }}>
          {mode === 'signin' && <>No account yet? <button onClick={() => go('signup')} style={authLink}>Create one</button></>}
          {mode === 'signup' && <>Already have an account? <button onClick={() => go('signin')} style={authLink}>Sign in</button></>}
          {mode === 'reset' && <button onClick={() => go('signin')} style={authLink}>Back to sign in</button>}
        </div>
      </div>
    </div>
  );
}

/* Shown after the user clicks the reset link in their email (recovery session). */
function UpdatePasswordScreen({ onDone }) {
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr('');
    if (password.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    setBusy(true);
    try {
      const { error } = await sb.auth.updateUser({ password });
      if (error) throw error;
      // Clear the recovery token from the URL, then hand off to the app.
      try { history.replaceState(null, '', window.location.pathname); } catch (e3) {}
      onDone();
    } catch (e2) { setErr(e2.message || 'Could not update password.'); setBusy(false); }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <div style={{ width: '100%', maxWidth: 380 }}>
        <div style={{ textAlign: 'center', fontSize: 22, fontWeight: 800, letterSpacing: '.16em', textTransform: 'uppercase', color: 'var(--fg-1)', marginBottom: 8 }}>Set a new password</div>
        <div style={{ textAlign: 'center', fontSize: 13, color: 'var(--fg-3)', marginBottom: 26 }}>Enter a new password for your account</div>
        <form onSubmit={submit}>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="New password" autoComplete="new-password" style={AUTH_FIELD} autoFocus />
          {err && <div style={{ color: 'var(--recovery-low)', fontSize: 13, marginBottom: 12 }}>{err}</div>}
          <button type="submit" disabled={busy} style={AUTH_BTN(busy)}>{busy ? 'Please wait…' : 'Update password'}</button>
        </form>
      </div>
    </div>
  );
}

/* Top-level gate: show the app only when authenticated. */
function Root() {
  const [session, setSession] = useState(undefined); // undefined = loading
  const [recovery, setRecovery] = useState(false);    // true after a password-reset link

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = sb.auth.onAuthStateChange((event, s) => {
      if (event === 'PASSWORD_RECOVERY') setRecovery(true);
      if (event === 'SIGNED_OUT') setRecovery(false);
      setSession(s || null);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (recovery) return <UpdatePasswordScreen onDone={() => setRecovery(false)} />;
  if (session === undefined) {
    return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--fg-3)', fontSize: 13, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase' }}>Loading…</div>;
  }
  if (!session) return <AuthScreen />;
  return <App key={session.user.id} userId={session.user.id} email={session.user.email} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
